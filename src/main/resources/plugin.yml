name: Mortality
version: 1.0.0
main: io.github.black_Kittys22.mortality.Main
api-version: "1.21"
author: black_Kittys

softdepend: [WorldEdit, Protcollib]

commands:
  sethearts:
    description: Setzt die Herzen eines bestimmten Spielers.
    permission: heartsystem.set
    usage: /sethearts <Spieler> <Anzahl>

  settings:
    description: Öffnet das Einstellungsmenü
    usage: /settings

    language:
      description: Ändere die Sprache / Change language
      usage: /language <sprache/language>
      aliases: [ lang, sprache ]

